<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Document</title>
</head>
<body class="bg-light">

  <!-- Navbar -->
   <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">JobPortal</a>
    </div>
   </nav>

   <div class="container mt-5">
    <h2 class="text-center mb-4">Applied Jobs</h2>

    <div id="jobContainer" class="row"></div>
   </div>

   <script>
    let jobContainer = document.getElementById("jobContainer");

    // Get applied jobs
    let appliedJobs = JSON.parse(localStorage.getItem("appliedJobs")) || [];

    if(appliedJobs.length ===0){
      jobContainer.innerHTML = "<p class ='text-center'>No jobs applied yet</p>";

    } else {
      appliedJobs.forEach(job => {
        let div = document.createElement("div");
        div.className = "col-md-4";

        div.innerHTML = `
        <div class="card p-3 shadow">
          <h5>${job}</h5>
          <button class="btn btn-danger mt-2" onclick="removeJob('${job}')">
            Remove
          </button>
        </div>
        `;
        jobContainer.appendChild(div);
      });
    }

    //Remove job
    function removeJob(jobTitle){
      let appliedJobs  =JSON.parse(localStorage.getItem("appliedJobs")) || [];

      appliedJobs = appliedJobs.filter(job => job !== jobTitle);
      localStorage.setItem("appliedJobs", JSON.stringify(appliedJobs));
      location.reload();
    }
   </script>

  
</body>
</html>
