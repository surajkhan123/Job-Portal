<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Forgot Password</title>
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="card p-4 mx-auto" style="max-width: 400px">
      <h3 class="text-center">Reset Password</h3>
      <p id="msg" class=" text-center"></p>

      <input type="email" id="email" class="form-control my-2"
      placeholder="Enter your registered email">
      <input type="password" id="password" class="form-control my-2"
      placeholder="New Password">

      <button class="btn btn-primary w-100" onclick="resetPassword()">Reset</button>
    </div>
  </div>

  <script>
    function resetPassword(){
      let email = document.getElementById("email").value.trim();
      let newPassword = document.getElementById("password").value.trim();
      let msg = document.getElementById("msg");

      msg.innerText = "";

      let storedUser = JSON.parse(localStorage.getItem("user"));

      if(!storedUser){
        msg.innerText = "⚠️ No user found";
        return;
      }

      if(email ==="" || newPassword ===""){
        msg.innerText = "⚠️ Fill all fields";
        return;
      }

      if(email !== storedUser.email){
        msg.innerText = "❌ Email not found";
        return;
      }

      // UPdated password
      storedUser.password = newPassword;
      localStorage.setItem("user", JSON.stringify(storedUser));

      msg.style.color = "green";
      msg.innerText = "✅ Password reset successful";

      setTimeout(() =>{
        window.location.href = "login.html";
      }, 1500);

    }
  </script>


</body>
</html>
