<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Portal</title>
  <link rel="stylesheet" href="./style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
  <!-- NavBar -->
   <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">Job Portal</a>
      <div>
        <span id="userName" class="text-white me-3"></span>
        <!-- <span id="userEmail" class="text-white me-3"></span> -->
        <a href="dashboard.html" class="btn btn-outline-light">Dashboard</a>

        <!-- wrapping -->
         <div id="authButtons" style="display: inline">
        <a href="register.html" class="btn btn-primary">Register</a>
        <a href="login.html" class="btn btn-outline-light">Login</a>
        </div>

        <button class="btn btn-danger" onclick="logout()">Logout</button>
      </div>
    </div>
   </nav>

   <!-- Hero Section -->
    <section class="hero text-center text-white d-flex align-items-center">
      <div class="container">
        <h1>Find Your Dream Job</h1>
        <p>Search thousands of jobs easily</p>
        <input type="text" id="searchInput" class="form-control w-50 mx-auto"
        placeholder="Search jobs...">
      </div>
    </section>

    <!-- JOb Listings -->
     <div class="container mt-5">
      <h2 class="text-center mb-4">Available Jobs</h2>
      <p id="applyMsg" class="text-center fw-bold"></p>
      <div class="row" id="job-list"></div>
     </div>

     <footer class="footer bg-dark text-white text-center p-3 mt-5">
      <p class="mb-0">© 2026 Job Portal | Made by Suraj Khan</p>
      <small>
        <a href="#" class="text-white me-2">Privacy</a>
        <a href="#" class="text-white">Contact</a>
      </small>
     </footer>

     <script src="app.js"></script>
   
  
</body>
</html>
